name: Build
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true

# Принудительно заставляем среду использовать новый Node 24 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. Обновлено до v6 — нативная поддержка Node 24
    - uses: actions/checkout@v6 
    
    # 2. Обновлено до v4 (поддерживает Node 24) и Java 17 для стабильной сборки Gradle
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        
    - run: |
        chmod +x ./gradlew
        sed -i 's/moduleDescription = "/moduleDescription = "(${{ github.event.inputs.package_name }}) /g' module.gradle
        sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h
        ./gradlew :module:assembleRelease
        
    - uses: actions/upload-artifact@v4
      with:
        name: zygisk-il2cppdumper
        path: out/magisk_module_release/
        
