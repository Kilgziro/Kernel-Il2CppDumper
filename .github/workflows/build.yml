name: Build

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Fix gradlew (права + line endings)
      run: |
        # Устанавливаем dos2unix
        sudo apt-get update && sudo apt-get install -y dos2unix
        
        # Фиксим line endings (CRLF → LF) и права
        dos2unix gradlew
        chmod +x gradlew
        ls -la gradlew

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 11

    - name: Build Magisk module
      run: |
        sed -i 's/moduleDescription = "/moduleDescription = "(${{ github.event.inputs.package_name }}) /g' module.gradle
        sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h
        ./gradlew :module:assembleRelease --stacktrace

    - uses: actions/upload-artifact@v4
      with:
        name: zygisk-il2cppdumper
        path: out/magisk_module_release/
